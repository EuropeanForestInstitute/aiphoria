name: Run tests

on:
  push:
    branches: [ main ]
    pull_requests:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install .
          pip install pytest

      - name: Run tests
        run: pytest



